// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// Indian number formatting: 1,23,456
function formatINR(n) {
  const s = Math.round(n).toString();
  if (s.length <= 3) return s;
  const last3 = s.slice(-3);
  const rest = s.slice(0, -3);
  const restFormatted = rest.replace(/\B(?=(\d{2})+(?!\d))/g, ',');
  return restFormatted + ',' + last3;
}

function BarChart({ results }) {
  const sorted = [...results].sort((a,b) => a.price - b.price);
  const max = Math.max(...sorted.map(r => r.price));
  const min = Math.min(...sorted.map(r => r.price));
  // Y-axis gridlines
  const steps = 5;
  const niceMax = Math.ceil(max / 10000) * 10000;
  const gridLines = Array.from({ length: steps + 1 }, (_, i) => Math.round(niceMax * (steps - i) / steps));

  const chartH = 200;
  const labelGutter = 50;

  return (
    <div style={resultStyles.chartCard}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom: 14 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 600 }}>Fare distribution by destination</div>
          <div style={{ fontSize: 11.5, color: 'var(--text-dim)', marginTop: 3 }}>Lowest one-way fare per route · sorted cheapest → highest</div>
        </div>
        <div style={{ display:'flex', gap: 8, alignItems:'center', fontSize: 11.5, color:'var(--text-dim)' }}>
          <span style={{ display:'inline-block', width: 10, height: 10, borderRadius: 2, background:'linear-gradient(180deg, #3b82f6, #2563EB)' }}/>
          One-way base fare (₹)
        </div>
      </div>

      <div style={{ display:'flex', gap: 0, height: chartH + 32, position:'relative' }}>
        {/* Y axis labels */}
        <div style={{ width: labelGutter, display:'flex', flexDirection:'column', justifyContent:'space-between', paddingTop: 0, paddingBottom: 32 }} className="mono tabnum">
          {gridLines.map((v, i) => (
            <div key={i} style={{ fontSize: 10, color: 'var(--text-dim-2)', textAlign:'right', paddingRight: 8 }}>
              ₹{formatINR(v).replace(/,000$/, 'k').replace(/000$/, 'k')}
            </div>
          ))}
        </div>

        {/* Bars + gridlines */}
        <div style={{ flex: 1, position: 'relative', borderLeft: '1px solid var(--border)' }}>
          {/* gridlines */}
          {gridLines.map((v, i) => (
            <div key={i} style={{
              position: 'absolute',
              top: (i / steps) * chartH,
              left: 0, right: 0,
              borderTop: i === steps ? '1px solid var(--border-strong)' : '1px dashed rgba(255,255,255,0.05)',
              height: 1,
            }} />
          ))}

          {/* bars */}
          <div style={{ position:'absolute', inset: 0, display:'flex', alignItems:'flex-end', justifyContent:'space-around', height: chartH, paddingTop: 4 }}>
            {sorted.map((r, i) => {
              const h = (r.price / niceMax) * chartH;
              const isMin = r.price === min;
              return (
                <div key={r.code} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap: 6, height: chartH, justifyContent:'flex-end', paddingInline: 4 }}>
                  <div className="mono tabnum" style={{ fontSize: 9.5, color: isMin ? '#10B981' : 'var(--text-dim-2)' }}>
                    ₹{formatINR(r.price)}
                  </div>
                  <div style={{
                    width: '70%', maxWidth: 44,
                    height: h,
                    borderRadius: '4px 4px 0 0',
                    background: isMin
                      ? 'linear-gradient(180deg, #10B981, #047857)'
                      : 'linear-gradient(180deg, #60a5fa, #2563EB)',
                    boxShadow: isMin
                      ? '0 0 24px -6px rgba(16,185,129,0.6), inset 0 1px 0 rgba(255,255,255,0.25)'
                      : 'inset 0 1px 0 rgba(255,255,255,0.18)',
                    position: 'relative',
                  }}>
                    {isMin && (
                      <div style={{
                        position:'absolute', top: -16, left: '50%', transform:'translateX(-50%)',
                        fontSize: 8.5, color: '#10B981', whiteSpace:'nowrap', fontWeight:600, letterSpacing:'0.08em'
                      }}>LOW</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* x labels */}
          <div style={{ position:'absolute', top: chartH + 4, left:0, right:0, display:'flex', justifyContent:'space-around' }}>
            {sorted.map(r => (
              <div key={r.code} style={{ flex:1, textAlign:'center', fontSize: 10.5, fontWeight: 600, color: r.price === min ? '#10B981' : 'var(--text-dim)' }} className="mono">
                {r.code}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function Results({ results }) {
  const prices = results.map(r => r.price);
  const cheapest = Math.min(...prices);
  const cheapestRoute = results.find(r => r.price === cheapest);
  const median = prices.sort((a,b) => a - b)[Math.floor(prices.length / 2)];
  return (
    <div style={{ display:'flex', flexDirection:'column', gap: 18 }}>
      <div style={resultStyles.metricGrid}>
        <Metric
          label="Routes Found"
          value={results.length}
          sub="across 6 carriers"
          icon={<ChartIcon size={14} stroke="var(--text-dim)" />}
        />
        <Metric
          label="Cheapest"
          value={`₹${formatINR(cheapest)}`}
          sub={`${cheapestRoute.code} · ${cheapestRoute.airline}`}
          icon={<TagIcon size={14} stroke="#10B981" />}
          glow
          accent="#10B981"
        />
        <Metric
          label="Median Price"
          value={`₹${formatINR(median)}`}
          sub="vs. ₹28,400 last week"
          icon={<TrendIcon size={14} stroke="var(--text-dim)" />}
        />
        <Metric
          label="Best Deal To"
          value={cheapestRoute.city}
          sub="42% below avg"
          icon={<SparkIcon size={14} stroke="#F59E0B" />}
        />
      </div>

      <BarChart results={results} />

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop: 4 }}>
        <div style={{ fontSize: 14, fontWeight: 600 }}>
          All flights
          <span style={{ color:'var(--text-dim)', fontWeight: 500, marginLeft: 8 }}>{results.length} results</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap: 14, fontSize: 11.5, color:'var(--text-dim)' }}>

      <div style={resultStyles.cardGrid}>
        {[...results].sort((a,b) => a.price - b.price).map(r => <FlightCard key={r.code} flight={r} />)}
      </div>
    </div>
  );
}

function SuggestionChips({ query }) {
  const suggestions = useMemo(() => {
    if (!query || query.length < 1) return [];
    const q = query.toLowerCase();
    const matches = [];
    Object.values(window.FD_DATA.DESTINATIONS).flat().forEach(d => {
      if (d.code.toLowerCase().includes(q) || d.city.toLowerCase().includes(q)) {
        matches.push(d);
      }
    });
    return matches.slice(0, 5);
  }, [query]);
  if (suggestions.length === 0) return null;
  return (
    <div style={{ ...appStyles.resultChips, marginTop: -8 }}>
      <span style={{ fontSize: 11, color:'var(--text-dim-2)', textTransform:'uppercase', letterSpacing:'0.1em', alignSelf:'center', marginRight: 4 }}>Matches</span>
      {suggestions.map(s => (
        <span key={s.code} style={appStyles.pillChip(false)}>
          <span className="mono" style={{ color:'var(--text)', fontWeight: 600 }}>{s.code}</span>
          <span>{s.city}</span>
        </span>
      ))}
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [query, setQuery] = useState('');
  const [selected, setSelected] = useState(['BKK','HKT','DXB','SIN','KUL','DPS','CDG','LHR','NRT']);
  const [cabin, setCabin] = useState('Economy');
  const [searched, setSearched] = useState(true);

  // Apply density
  const isCompact = tweaks.density === 'compact';

  const visibleResults = useMemo(() => {
    return window.FD_DATA.RESULTS.filter(r => selected.includes(r.code));
  }, [selected]);

  const mobile = tweaks.viewport === 'mobile';

  const origin = { code: 'DEL', city: 'New Delhi' };
  const dates = { depart: 'Sat, 14 Jun', return: 'Sun, 22 Jun' };
  const passengers = { adults: 2, children: 0 };

  // For mobile we render a different shell
  if (mobile) {
    return (
      <div style={{ display:'flex', justifyContent:'center', padding: 24, minHeight: '100vh' }}>
        <MobileApp
          query={query} setQuery={setQuery}
          selected={selected} setSelected={setSelected}
          searched={searched} setSearched={setSearched}
          cabin={cabin} setCabin={setCabin}
          origin={origin} dates={dates} passengers={passengers}
          visibleResults={visibleResults}
        />
        <FlightDeskTweaks tweaks={tweaks} setTweak={setTweak} />
      </div>
    );
  }

  const topbarLayout = tweaks.layout === 'topbar';

  return (
    <div style={{ ...appStyles.shell, flexDirection: topbarLayout ? 'column' : 'row' }}>
      {tweaks.showLoader && <Loader />}

      {topbarLayout
        ? <TopTripBar cabin={cabin} setCabin={setCabin} origin={origin} dates={dates} passengers={passengers} />
        : <Sidebar cabin={cabin} setCabin={setCabin} origin={origin} dates={dates} passengers={passengers} />
      }

      <main style={{ ...appStyles.main, padding: topbarLayout ? '20px 36px 64px' : appStyles.main.padding }} data-screen-label="Search & Results">
        {!topbarLayout && <TopBar />}

        <div style={{ display:'flex', flexDirection:'column', gap: 12 }}>
          <div>
            <div style={{ fontSize: 22, fontWeight: 700, letterSpacing:'-0.02em' }}>Find fares from {origin.city}</div>
            <div style={{ fontSize: 12.5, color:'var(--text-dim)', marginTop: 4 }}>
              Compare one-way and return fares across regions · live inventory from 12 carriers
            </div>
          </div>
          <HeroSearch query={query} setQuery={setQuery} />
          <SuggestionChips query={query} />
        </div>

        <DestinationBrowser selected={selected} setSelected={setSelected} />

        <SelectionBar selected={selected} setSelected={setSelected} />

        <SearchButton count={selected.length} onSearch={() => setSearched(true)} />

        {tweaks.showEmptyState || !searched || selected.length === 0
          ? <EmptyState />
          : <Results results={visibleResults} />
        }
      </main>

      <FlightDeskTweaks tweaks={tweaks} setTweak={setTweak} />
    </div>
  );
}

  },
  appHeader: {
    display:'flex', justifyContent:'space-between', alignItems:'center', marginTop: 4,
  },
  fab: {
    position:'absolute', bottom: 20, right: 20,
    width: 52, height: 52, borderRadius: '50%',
    background: 'linear-gradient(135deg, #2563EB, #6366F1)',
    display:'grid', placeItems:'center',
    boxShadow:'0 12px 32px -8px rgba(99,102,241,0.6)',
    border:'1px solid rgba(255,255,255,0.1)',
    cursor:'pointer',
    zIndex: 10,
  },
  metricGrid: { display:'grid', gridTemplateColumns:'1fr 1fr', gap: 10 },
  destScroller: { display:'flex', gap: 8, overflowX:'auto' },
};

function MobileApp({ query, setQuery, selected, setSelected, searched, setSearched, cabin, setCabin, origin, dates, passengers, visibleResults }) {
  const [region, setRegion] = useState('sea');
  const { REGIONS, DESTINATIONS, FLAGS } = window.FD_DATA;
  const prices = visibleResults.map(r => r.price);
  const cheapest = prices.length ? Math.min(...prices) : 0;
  const cheapestRoute = visibleResults.find(r => r.price === cheapest);
  const median = prices.length ? [...prices].sort((a,b)=>a-b)[Math.floor(prices.length/2)] : 0;

  return (
    <div style={mobileStyles.shell} data-screen-label="Mobile · 390px">
      <div style={mobileStyles.statusBar}>
        <span className="mono">9:41</span>
        <span style={{ display:'flex', gap: 4, alignItems:'center' }}>
          <svg width="14" height="10" viewBox="0 0 14 10"><path d="M0 9h2V7H0zm4 0h2V5H4zm4 0h2V3H8zm4 0h2V1h-2z" fill="#fff"/></svg>
          <svg width="14" height="10" viewBox="0 0 14 10"><rect x="0" y="2" width="11" height="6" rx="1" stroke="#fff" fill="none" /><rect x="2" y="4" width="7" height="2" fill="#fff"/></svg>
        </span>
      </div>

      <div style={mobileStyles.appHeader}>
        <div style={{ display:'flex', alignItems:'center', gap: 8 }}>
          <div style={{ width: 28, height: 28, borderRadius: 7, background:'linear-gradient(135deg, #2563EB, #6366F1)', display:'grid', placeItems:'center' }}>
            <PlaneTiltIcon size={15} stroke="#fff" fill="#fff" strokeWidth={0}/>
          </div>
          <div style={{ fontWeight: 700, fontSize: 16 }}>FlightDesk</div>
        </div>
        <div style={{ ...appStyles.chip, fontSize: 10 }}><DotIcon color="#10B981" size={6} /> LIVE</div>
      </div>

      {/* search bar */}
      <div style={{ ...appStyles.searchWrap, borderRadius: 14, padding: 1.2 }}>
        <div style={{ ...appStyles.searchInner, padding: '11px 14px', gap: 10, borderRadius: 12.8 }}>
          <SearchIcon size={16} stroke="var(--text-dim)" />
          <input style={{ ...appStyles.searchInput, fontSize: 13.5 }} placeholder="Search destinations or describe trip…" value={query} onChange={e => setQuery(e.target.value)} />
          <MicIcon size={15} stroke="var(--text-dim)" />
        </div>
      </div>

      {/* origin/date strip */}
      <div style={{ display:'flex', gap: 8 }}>
        <div style={{ flex:1, ...sidebarStyles.field, padding: '8px 10px' }}>
          <PinIcon size={13} stroke="var(--text-dim)" />
          <div style={{ flex:1 }}>
            <div style={{ ...sidebarStyles.fieldLabel, fontSize: 9 }}>From</div>
            <div style={{ ...sidebarStyles.fieldValue, fontSize: 11.5 }}>{origin.code}</div>
          </div>
        </div>
        <div style={{ flex:2, ...sidebarStyles.field, padding: '8px 10px' }}>
          <CalendarIcon size={13} stroke="var(--text-dim)" />
          <div style={{ flex:1 }}>
            <div style={{ ...sidebarStyles.fieldLabel, fontSize: 9 }}>Dates</div>
            <div style={{ ...sidebarStyles.fieldValue, fontSize: 11.5 }}>{dates.depart} → {dates.return}</div>
          </div>
        </div>
      </div>

      {/* region tabs */}
      <div style={{ display:'flex', gap: 6, overflowX:'auto' }} className="noscroll">
        {REGIONS.map(r => (
          <div key={r.id} onClick={() => setRegion(r.id)} style={{ ...appStyles.regionTab(region === r.id), padding: '6px 10px', fontSize: 12 }}>
            <span>{r.flag}</span>
            <span>{r.name}</span>
          </div>
        ))}
      </div>

      {/* dest chips - horizontal */}
      <div style={mobileStyles.destScroller} className="noscroll">
        {DESTINATIONS[region].map(d => {
          const sel = selected.includes(d.code);
          return (
            <div key={d.code} onClick={() => setSelected(prev => prev.includes(d.code) ? prev.filter(c=>c!==d.code) : [...prev, d.code])}
              style={{ ...appStyles.destChip(sel), minWidth: 110, padding:'10px 12px' }}>
              <div style={appStyles.destCode(sel)}>{d.code}</div>
              <div style={appStyles.destCity(sel)}>{d.city}</div>
            </div>
          );
        })}
      </div>

      {/* selected pills */}
      {selected.length > 0 && (
        <div style={{ ...appStyles.selectionBar, padding:'10px 12px', overflowX:'auto', flexWrap:'nowrap' }} className="noscroll">
          {selected.map(code => (
            <span key={code} style={{ ...appStyles.selectedPill, flex:'none' }}>
              <span>{FLAGS[code]}</span>
              <span className="mono" style={{ fontWeight: 600 }}>{code}</span>
              <button style={appStyles.pillClose} onClick={() => setSelected(p=>p.filter(c=>c!==code))}>
                <XIcon size={9} stroke="#fff" strokeWidth={2.2}/>
              </button>
            </span>
          ))}
        </div>
      )}

      {/* search button */}
      <SearchButton count={selected.length} onSearch={() => setSearched(true)} />

      {/* metric grid 2x2 */}
      {searched && visibleResults.length > 0 && (
        <>
          <div style={mobileStyles.metricGrid}>
            <Metric label="Routes" value={visibleResults.length} sub="found" icon={<ChartIcon size={12} stroke="var(--text-dim)"/>} />
            <Metric label="Cheapest" value={`₹${formatINR(cheapest)}`} sub={cheapestRoute?.code} icon={<TagIcon size={12} stroke="#10B981"/>} glow accent="#10B981"/>
            <Metric label="Median" value={`₹${formatINR(median)}`} sub="−12% w/w" icon={<TrendIcon size={12} stroke="var(--text-dim)"/>} />
            <Metric label="Best to" value={cheapestRoute?.city || '—'} sub="42% below avg" icon={<SparkIcon size={12} stroke="#F59E0B"/>} />
          </div>

          {/* stacked flight cards */}
          <div style={{ display:'flex', flexDirection:'column', gap: 10 }}>
            {[...visibleResults].sort((a,b)=>a.price-b.price).slice(0, 4).map(r => <FlightCard key={r.code} flight={r}/>)}
          </div>
        </>
      )}

      {/* FAB */}
      <div style={mobileStyles.fab}>
        <SettingsIcon size={20} stroke="#fff" />
      </div>
    </div>
  );
}

// ===== Tweaks panel =====
function FlightDeskTweaks({ tweaks, setTweak }) {
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection title="Layout">
        <TweakRadio value={tweaks.layout} onChange={v => setTweak('layout', v)}
          options={[{ value:'topbar', label:'Top bar' }, { value:'sidebar', label:'Sidebar' }]} />
      </TweakSection>
      <TweakSection title="Viewport">
        <TweakRadio value={tweaks.viewport} onChange={v => setTweak('viewport', v)}
          options={[{ value:'desktop', label:'Desktop' }, { value:'mobile', label:'Mobile' }]} />
      </TweakSection>
      <TweakSection title="State">
        <TweakToggle label="Show loading bar" value={tweaks.showLoader} onChange={v => setTweak('showLoader', v)} />
        <TweakToggle label="Force empty state" value={tweaks.showEmptyState} onChange={v => setTweak('showEmptyState', v)} />
      </TweakSection>
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
